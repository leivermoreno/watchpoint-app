name: CI

on:
  push:

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: watchpoint
          POSTGRES_PASSWORD: watchpoint
          POSTGRES_DB: watchpoint_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U watchpoint -d watchpoint_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      WATCHPOINT_SECRET_KEY: test-secret-key
      WATCHPOINT_DATABASE_URI: postgresql+psycopg2://watchpoint:watchpoint@localhost:5432/watchpoint_test
      WATCHPOINT_TEST_DATABASE_URI: postgresql+psycopg2://watchpoint:watchpoint@localhost:5432/watchpoint_test
      WATCHPOINT_ALLOW_DESTRUCTIVE_TESTS: "1"
      WATCHPOINT_WATCHMODE_API_KEY: test-api-key

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run Ruff lint
        run: python -m ruff check .

      - name: Run Ruff format check
        run: python -m ruff format --check .

      - name: Run pytest
        run: python -m pytest
