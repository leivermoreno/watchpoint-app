default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff-check
        args: [--fix]
        stages: [pre-commit]
      - id: ruff-format
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: ruff-check-all
        name: ruff check
        entry: ruff check .
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: ruff-format-check-all
        name: ruff format --check
        entry: ruff format --check .
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: pytest
        name: pytest
        entry: python -m pytest
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
